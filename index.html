<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anik Fin - Banking Balance System</title>
    <style>
        :root {
            --primary-color: #0d233a;
            --accent-color: #cca43b;
            --success-color: #2ec4b6;
            --danger-color: #e71d36;
            --light-bg: #f8f9fa;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light-bg);
            color: #333;
        }

        header {
            background-color: var(--primary-color);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--accent-color);
        }

        .logo {
            height: 45px;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 15px;
        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 2px solid #eee;
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
        }

        button:hover {
            background-color: #173d63;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
        }

        .badge-match {
            background-color: #d4edda;
            color: #155724;
        }

        .badge-gap {
            background-color: #f8d7da;
            color: #721c24;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: var(--primary-color);
            color: white;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #selection-screen, #app-screen {
            display: none;
        }

        .active {
            display: block !important;
        }
    </style>
</head>
<body>

    <header>
        <img src="https://anikfin.com/wp-content/uploads/2024/06/anik-horizontal-1-1024x400.png" alt="Anik Logo" class="logo">
        <span id="user-info" style="color: white; font-weight: bold;"></span>
    </header>

    <div class="container">
        <div id="loading" class="loader"></div>

        <!-- Selection Screen (No Password) -->
        <div id="selection-screen" class="card active">
            <h2>तुमचे प्रोफाइल निवडा</h2>
            <div class="form-group">
                <label for="user-select">वापरकर्ता (Select User)</label>
                <select id="user-select" onchange="onUserSelected()">
                    <option value="">-- निवडा --</option>
                </select>
            </div>
        </div>

        <!-- Main App Screen -->
        <div id="app-screen">
            <!-- Admin View -->
            <div id="admin-view" class="card" style="display:none;">
                <h2>अ‍ॅडमिन डॅशबोर्ड (Admin Dashboard)</h2>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>वेळ</th>
                                <th>बँक</th>
                                <th>युनिट</th>
                                <th>सिस्टम बॅलन्स</th>
                                <th>स्टेटमेंट बॅलन्स</th>
                                <th>तफावत (Gap)</th>
                                <th>कारण</th>
                                <th>अपडेट करणारा</th>
                                <th>स्टेटस</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body">
                            <!-- Data -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Accountant / Manager View -->
            <div id="entry-view" class="card" style="display:none;">
                <h2 id="entry-title">बॅलन्स अपडेट फॉर्म</h2>
                <form id="balance-form" onsubmit="submitForm(event)">
                    <div class="form-group">
                        <label for="bank-select">बँक निवडा</label>
                        <select id="bank-select" required></select>
                    </div>
                    <div class="form-group" id="unit-group">
                        <label for="unit-input">युनिटचे नाव</label>
                        <input type="text" id="unit-input" placeholder="उदा. Unit A">
                    </div>
                    <div class="form-group">
                        <label for="system-bal">सिस्टम बॅलन्स (System Balance)</label>
                        <input type="number" step="0.01" id="system-bal" oninput="calculateGap()" required>
                    </div>
                    <div class="form-group">
                        <label for="statement-bal">स्टेटमेंट बॅलन्स (Statement Balance)</label>
                        <input type="number" step="0.01" id="statement-bal" oninput="calculateGap()" required>
                    </div>
                    <div class="form-group">
                        <label>तफावत (Gap)</label>
                        <input type="number" id="gap-display" readonly style="background:#e9ecef; font-weight:bold;">
                    </div>
                    <div class="form-group" id="reason-group" style="display:none;">
                        <label for="gap-reason" style="color:var(--danger-color);">तफावत असण्याचे कारण स्पष्ट लिहा *</label>
                        <textarea id="gap-reason" rows="3" placeholder="कारणाची नोंद करा..."></textarea>
                    </div>
                    <button type="submit">माहिती सबमिट करा</button>
                </form>
            </div>
            
            <button onclick="logout()" style="background-color: #6c757d; margin-top: 15px;">मागे जा / युझर बदला</button>
        </div>
    </div>

    <script>
        // तुमची गुगल स्क्रिप्टची URL येथे टाका
        const API_URL = "https://script.google.com/macros/s/AKfycbwbuSo0mK1eQHfrfyughT_Vkzt9-OexfRE3KVGVMI0fghv7mwyl3SbWAbl-MaOGvIvp/exec";

        let appData = { users: [], transactions: [] };
        let currentUser = null;

        window.addEventListener('DOMContentLoaded', () => {
            fetchData();
        });

        function showLoader(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        async function fetchData() {
            showLoader(true);
            try {
                const response = await fetch(`${API_URL}?action=getData`);
                appData = await response.json();
                populateUserDropdown();
            } catch (error) {
                console.error("डेटा लोड करण्यास अडचण आली:", error);
            } finally {
                showLoader(false);
            }
        }

        function populateUserDropdown() {
            const select = document.getElementById('user-select');
            select.innerHTML = '<option value="">-- निवडा --</option>';
            appData.users.forEach(user => {
                let opt = document.createElement('option');
                opt.value = user.User_Name;
                opt.innerHTML = `${user.User_Name} (${user.Role})`;
                select.appendChild(opt);
            });
        }

        function onUserSelected() {
            const selectedVal = document.getElementById('user-select').value;
            if (!selectedVal) return;

            currentUser = appData.users.find(u => u.User_Name === selectedVal);
            
            document.getElementById('selection-screen').classList.remove('active');
            document.getElementById('app-screen').classList.add('active');
            document.getElementById('user-info').innerText = `${currentUser.User_Name} (${currentUser.Role})`;
            
            setupDashboard();
        }

        function setupDashboard() {
            const adminView = document.getElementById('admin-view');
            const entryView = document.getElementById('entry-view');
            const bankSelect = document.getElementById('bank-select');
            const unitGroup = document.getElementById('unit-group');

            bankSelect.innerHTML = '';
            
            if (currentUser.Role === 'Admin') {
                adminView.style.display = 'block';
                entryView.style.display = 'none';
                renderAdminTable();
            } else {
                adminView.style.display = 'none';
                entryView.style.display = 'block';

                const allowedBanks = currentUser.Assigned_Banks.split(',').map(b => b.trim());
                allowedBanks.forEach(bank => {
                    let opt = document.createElement('option');
                    opt.value = bank;
                    opt.innerHTML = bank;
                    bankSelect.appendChild(opt);
                });

                if (currentUser.Role === 'Account Manager') {
                    unitGroup.style.display = 'none';
                    document.getElementById('entry-title').innerText = "ग्लोबल बँक बॅलन्स अपडेट";
                } else {
                    unitGroup.style.display = 'block';
                    document.getElementById('entry-title').innerText = "युनिट बॅलन्स अपडेट";
                }
            }
        }

        function calculateGap() {
            const sysBal = parseFloat(document.getElementById('system-bal').value) || 0;
            const statBal = parseFloat(document.getElementById('statement-bal').value) || 0;
            const gap = sysBal - statBal;
            
            document.getElementById('gap-display').value = gap.toFixed(2);
            
            const reasonGroup = document.getElementById('reason-group');
            const reasonInput = document.getElementById('gap-reason');

            if (gap !== 0) {
                reasonGroup.style.display = 'block';
                reasonInput.setAttribute('required', 'true');
            } else {
                reasonGroup.style.display = 'none';
                reasonInput.removeAttribute('required');
                reasonInput.value = "";
            }
        }

        async function submitForm(event) {
            event.preventDefault();
            showLoader(true);

            const sysBal = parseFloat(document.getElementById('system-bal').value);
            const statBal = parseFloat(document.getElementById('statement-bal').value);
            const gap = sysBal - statBal;
            const reason = document.getElementById('gap-reason').value;

            if (gap !== 0 && !reason.trim()) {
                alert("तफावत असल्याने कारण लिहिणे आवश्यक आहे.");
                showLoader(false);
                return;
            }

            const payload = {
                bankName: document.getElementById('bank-select').value,
                unit: currentUser.Role === 'Account Manager' ? 'Global' : document.getElementById('unit-input').value,
                systemBalance: sysBal,
                statementBalance: statBal,
                gap: gap,
                reason: reason,
                updatedBy: currentUser.User_Name
            };

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                alert("माहिती यशस्वीरीत्या जतन झाली!");
                document.getElementById('balance-form').reset();
                document.getElementById('gap-display').value = "";
                document.getElementById('reason-group').style.display = 'none';
                fetchData();
            } catch (error) {
                alert("सबमिट करताना त्रुटी आली.");
            } finally {
                showLoader(false);
            }
        }

        function renderAdminTable() {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '';

            const reversedData = [...appData.transactions].reverse();

            reversedData.forEach(row => {
                const tr = document.createElement('tr');
                const gapVal = parseFloat(row.Gap) || 0;
                const statusBadge = gapVal === 0 
                    ? `<span class="badge badge-match">जुळला</span>` 
                    : `<span class="badge badge-gap">तफावत</span>`;

                tr.innerHTML = `
                    <td>${row.Timestamp ? new Date(row.Timestamp).toLocaleDateString() : '-'}</td>
                    <td>${row.Bank_Name || '-'}</td>
                    <td>${row.Unit || '-'}</td>
                    <td>${parseFloat(row.System_Balance || 0).toFixed(2)}</td>
                    <td>${parseFloat(row.Statement_Balance || 0).toFixed(2)}</td>
                    <td style="color:${gapVal !== 0 ? 'var(--danger-color)' : 'inherit'}; font-weight:bold;">${gapVal.toFixed(2)}</td>
                    <td>${row.Reason || '-'}</td>
                    <td>${row.Updated_By || '-'}</td>
                    <td>${statusBadge}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function logout() {
            currentUser = null;
            document.getElementById('user-select').value = "";
            document.getElementById('app-screen').classList.remove('active');
            document.getElementById('selection-screen').classList.add('active');
            document.getElementById('user-info').innerText = "";
        }
    </script>
</body>
</html>
